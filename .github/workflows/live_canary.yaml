name: FutureEval LIVE one-question canary

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type I_ACKNOWLEDGE_LIVE_SUBMISSION
        required: true
        type: string
  schedule:
    # One-shot retry immediately after the documented free quota reset.
    # The date guard below makes later annual cron matches fail before setup.
    - cron: "5 0 13 7 *"

permissions:
  contents: read

concurrency:
  group: futureeval-live-canary
  cancel-in-progress: false

jobs:
  live_canary:
    runs-on: ubuntu-latest
    env:
      EVENT_NAME: ${{ github.event_name }}
      CONFIRMATION: ${{ inputs.confirmation }}
      FUTUREEVAL_TOURNAMENT_ID: "33022"
      METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Require explicit LIVE acknowledgement or one-shot reset date
        run: |
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            test "$(date -u +%F)" = "2026-07-13"
          else
            test "$CONFIRMATION" = "I_ACKNOWLEDGE_LIVE_SUBMISSION"
          fi
      - name: Check out repository
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Verify model and compliance gates
        run: |
          poetry run python model_allowance_probe.py
          poetry run python -m unittest discover -s tests -v
          poetry run python compliance_check.py --check --require-secrets --json
      - name: Submit exactly one unforecasted supported LIVE question
        run: poetry run python main.py --mode live_canary --tournament-id 33022
